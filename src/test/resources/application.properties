spring.application.name=demo-test
spring.session.store-type=none

# Configuration H2 pour les tests


spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Paramètres de JPA/Hibernate

app.base-url=${APP_BASE_URL:http://localhost:8080}
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true


# Gemini API Key
gemini.api.key=dummy_gemini_key

mollie.api.key=dummy_mollie_key

# --- CONFIGURATION EMAIL (SMTP GMAIL) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dummy_user
spring.mail.password=dummy_pass
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true