spring.application.name=demo-test
spring.session.store-type=none

# Configuration H2 pour les tests


spring.datasource.url=jdbc:mysql://localhost:3306/demo_tfe
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Paramètres de JPA/Hibernate

app.base-url=${APP_BASE_URL:http://localhost:8080}
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true


# Gemini API Key
gemini.api.key=${GEMINI_API_KEY}

mollie.api.key=${MOLLIE_API_KEY}

# --- CONFIGURATION EMAIL (SMTP GMAIL) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true