<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Échec du Paiement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .error-icon {
            font-size: 5rem;
            color: #dc3545;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="error-card">
    <i class="bi bi-x-circle-fill error-icon"></i>
    <h2 class="mb-3">Échec du Paiement</h2>
    <p class="text-muted mb-4">
        Nous sommes désolés, mais votre paiement a échoué ou a été annulé.<br>
        <strong>Rassurez-vous, aucun montant n'a été débité de votre compte.</strong>
    </p>

    <div class="alert alert-light border mb-4">
        <strong>Commande concernée :</strong> <span th:text="${commandeId}"></span>
    </div>

    <div class="d-grid gap-3">
        <a th:href="@{/client/paiement/init/{id}(id=${commandeId})}" class="btn btn-warning btn-lg text-dark">
            <i class="bi bi-arrow-repeat"></i> Réessayer le paiement Bancontact
        </a>
        <a th:href="@{/client/commande/{id}(id=${commandeId})}" class="btn btn-primary btn-lg">
            <i class="bi bi-eye"></i> Voir ma commande
        </a>
        <a href="/client/menu" class="btn btn-outline-secondary">
            <i class="bi bi-house"></i> Retour à l'accueil
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
