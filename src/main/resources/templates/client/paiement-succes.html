<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paiement Réussi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            font-size: 5rem;
            color: #198754;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="success-card">
    <i class="bi bi-check-circle-fill success-icon"></i>
    <h2 class="mb-3">Paiement Réussi !</h2>
    <p class="text-muted mb-4">Merci pour votre commande. Votre paiement a été traité avec succès.</p>

    <div class="alert alert-light border mb-4">
        <strong>Numéro de commande :</strong> <span th:text="${commandeId}"></span>
    </div>

    <div class="d-grid gap-3">
        <a th:href="@{/client/facture/{id}(id=${commandeId})}" class="btn btn-primary btn-lg">
            <i class="bi bi-receipt"></i> Voir la facture
        </a>
        <a href="/client/menu" class="btn btn-outline-secondary">
            <i class="bi bi-house"></i> Retour à l'accueil
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
