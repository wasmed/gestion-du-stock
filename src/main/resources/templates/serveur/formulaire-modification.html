<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Modifier la Commande</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h3>Modifier la commande n°<span th:text="${commande.id}"></span></h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/orders/edit/{id}(id=${commande.id})}" method="post">
                        <!-- Sélecteur de table (ne change pas) -->
                        <div class="mb-3">
                            <label for="table" class="form-label">Table</label>
                            <select id="table" name="tableId" class="form-select" required>
                                <option th:each="tableRestaurant : ${tables}"
                                        th:value="${tableRestaurant.identifiant}"
                                        th:text="'Table ' + ${tableRestaurant.numeroTable}"
                                        th:selected="${tableRestaurant.identifiant == commande.table.identifiant}"></option>
                            </select>
                        </div>

                        <!-- Affichage du client (ne change pas) -->
                        <div class="mb-3">
                            <label class="form-label">Client</label>
                            <input type="text" class="form-control" th:value="${commande.client.fullName}" readonly>
                        </div>

                        <div class="alert alert-info" th:if="${commande.etat.toString() != 'EN_ATTENTE'}">
                            Cette commande est déjà en cours. Les éléments sélectionnés ci-dessous seront <strong>ajoutés</strong> (ils ne remplaceront pas l'existant).
                        </div>

                        <!-- ========================================================== -->
                        <!--     MISE À JOUR AVEC LES LISTES DE SÉLECTION             -->
                        <!-- ========================================================== -->
                        <div class="mb-4">
                            <h5 class="form-label border-bottom pb-2">Plats Cuisinés & Desserts</h5>
                            <div class="row row-cols-1 row-cols-md-2 g-2">
                                <div th:each="plat : ${platsCuisines}" class="col">
                                    <div class="d-flex justify-content-between align-items-center border p-2 rounded">
                                        <span th:text="${plat.nom}"></span>
                                        <div style="width: 80px;">
                                            <input type="number" th:name="'platQty_' + ${plat.identifiant}" class="form-control form-control-sm text-center" min="0" value="0">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h5 class="form-label border-bottom pb-2">Boissons</h5>
                            <div class="row row-cols-1 row-cols-md-2 g-2">
                                <div th:each="boisson : ${boissons}" class="col">
                                    <div class="d-flex justify-content-between align-items-center border p-2 rounded">
                                        <span th:text="${boisson.nom}"></span>
                                        <div style="width: 80px;">
                                            <input type="number" th:name="'platQty_' + ${boisson.identifiant}" class="form-control form-control-sm text-center" min="0" value="0">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h5 class="form-label border-bottom pb-2">Menus</h5>
                            <div class="row row-cols-1 row-cols-md-2 g-2">
                                <div th:each="menu : ${menus}" class="col">
                                    <div class="d-flex justify-content-between align-items-center border p-2 rounded">
                                        <span th:text="${menu.nom}"></span>
                                        <div style="width: 80px;">
                                            <input type="number" th:name="'menuQty_' + ${menu.id}" class="form-control form-control-sm text-center" min="0" value="0">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a th:href="@{/orders}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">Enregistrer les Modifications</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
