<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">
<body>
<div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestion des Stocks</h2>
        <a th:href="@{/stock/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Ajouter un Produit
        </a>
    </div>

    <div class="card mb-4 shadow-sm border-0 bg-light">
        <div class="card-body">
            <h4 class="text-primary fw-bold mb-3">
                <i class="bi bi-robot me-2"></i> Analyse de l'Assistant Jules
            </h4>
            <div class="mb-3">
                <button id="btnAnalyseIa" class="btn btn-outline-primary">
                    <i class="bi bi-magic me-1"></i> Lancer l'analyse
                </button>
            </div>

            <div id="iaLoadingSpinner" class="d-none mb-3">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Chargement...</span>
                </div>
                <span class="ms-2">L'IA réfléchit...</span>
            </div>

            <div id="iaResultBox" class="d-none alert alert-info shadow-sm">
            </div>
        </div>
    </div>

    <div class="table-container">

        <div th:if="${#maps.isEmpty(stocksParCategorie)}" class="alert alert-warning text-center">
            Aucun stock trouvé.
        </div>

        <div th:each="entry : ${stocksParCategorie}">
            <div class="card mb-4 shadow-sm border-0">
                <div class="card-header bg-white border-bottom-0 pt-3 px-4">
                    <h4 class="text-primary fw-bold mb-0">
                        <i class="bi bi-box-seam me-2"></i>
                        <span th:text="${entry.key}">Catégorie</span>
                    </h4>
                </div>
                <div class="card-body px-0 pt-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Nom du produit</th>
                                <th class="text-center">Conditionnement</th>
                                <th class="text-center">Stock Actuel</th>
                                <th class="text-center">Statut</th>
                                <th style="width: 35%;" class="text-center">Mouvement de Stock (Unité)</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="stock : ${entry.value}" th:classappend="${stock.stockActuel <= stock.stockMinimum ? 'table-danger' : ''}">
                                <td class="ps-4">
                                    <strong th:text="${stock.produit.nom}"></strong>
                                </td>

                                <td class="text-center">
                                    <span th:if="${stock.produit.quantite != null}" th:text="${#numbers.formatDecimal(stock.produit.quantite, 1, 2)} + ' ' + ${stock.produit.unite}"></span>
                                    <span th:if="${stock.produit.quantite == null}">-</span>
                                    <br>
                                    <small class="text-muted">/ unité</small>
                                </td>

                                <td class="text-center">
                                    <span class="fw-bold fs-5" th:text="${#numbers.formatDecimal(stock.stockActuel, 0, 0)}"></span>
                                    <span class="text-secondary"> unité(s)</span>
                                    <br>
                                    <div class="text-muted small">
                                        <span th:text="${stock.unitesPleines}"></span> unité(s) pleine(s)
                                        <span th:if="${stock.resteEntame > 0}" class="text-warning fw-bold">
                                            + <span th:text="${#numbers.formatDecimal(stock.resteEntame, 1, 2)}"></span> entamé(s)
                                        </span>
                                    </div>
                                    <small class="text-info" th:if="${stock.produit.quantite != null}" th:text="'(Total : ' + ${#numbers.formatDecimal(stock.stockActuel * stock.produit.quantite, 1, 2)} + ' ' + ${stock.produit.unite} + ')'"></small>
                                </td>

                                <td class="text-center">
                                    <span th:if="${stock.stockActuel <= stock.stockMinimum}" class="badge bg-danger">Alerte</span>
                                    <span th:if="${stock.stockActuel > stock.stockMinimum}" class="badge bg-success">OK</span>
                                </td>

                                <td class="text-center">
                                    <form th:action="@{/stock/update}" method="post" class="d-flex flex-column align-items-center justify-content-center">
                                        <input type="hidden" name="stockId" th:value="${stock.id}" />
                                        <div class="input-group input-group-sm mb-2 w-75">
                                            <input type="number" name="quantiteSaisie" class="form-control text-center" placeholder="Quantité" required step="1" min="1" />
                                            <span class="input-group-text bg-light text-secondary">unité(s)</span>
                                        </div>
                                        <div class="d-flex gap-2 w-75">
                                            <button type="submit" name="typeOperation" value="AJOUT" class="btn btn-success btn-sm flex-fill">
                                                <i class="bi bi-plus-lg"></i> Ajouter (Entrée)
                                            </button>
                                            <button type="submit" name="typeOperation" value="RETRAIT" class="btn btn-danger btn-sm flex-fill">
                                                <i class="bi bi-dash-lg"></i> Retirer (Sortie)
                                            </button>
                                        </div>
                                    </form>
                                </td>

                                <td class="text-end pe-4">
                                    <a th:href="@{/stock/edit/{id}(id=${stock.id})}" class="btn btn-sm btn-outline-primary me-2">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/stock/delete/{id}(id=${stock.id})}" class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce produit du stock ?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const btnAnalyseIa = document.getElementById("btnAnalyseIa");
            const iaLoadingSpinner = document.getElementById("iaLoadingSpinner");
            const iaResultBox = document.getElementById("iaResultBox");

            if (btnAnalyseIa) {
                btnAnalyseIa.addEventListener("click", function() {
                    iaLoadingSpinner.classList.remove("d-none");
                    iaResultBox.classList.add("d-none");
                    btnAnalyseIa.disabled = true;

                    fetch("/api/stock/alerte-ia")
                        .then(response => {
                            if (!response.ok) {
                                throw new Error("Erreur réseau");
                            }
                            return response.text();
                        })
                        .then(text => {
                            iaLoadingSpinner.classList.add("d-none");
                            iaResultBox.innerHTML = text.replace(/\n/g, "<br>");
                            iaResultBox.classList.remove("d-none");
                            btnAnalyseIa.disabled = false;
                        })
                        .catch(error => {
                            iaLoadingSpinner.classList.add("d-none");
                            iaResultBox.innerHTML = "<span class='text-danger'>Erreur lors de l'analyse IA : " + error.message + "</span>";
                            iaResultBox.classList.remove("d-none");
                            btnAnalyseIa.disabled = false;
                        });
                });
            }
        });
    </script>
</div>
</body>
</html>
