<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Cuisine | Chef Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta http-equiv="refresh" content="30">
    <style>
        .chef-card {
            border-left: 5px solid transparent;
        }
        .chef-card.en-attente {
            border-left-color: #dc3545;
            background-color: #fff8f8;
        }
        .chef-card.en-prepa {
            border-left-color: #ffc107;
            background-color: #fffef0;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container-fluid py-4">
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-5 page-header pb-3 border-bottom">
        <div>
            <h1 class="fw-bold mb-1">Cuisine</h1>
            <p class="text-muted mb-0">Gestion des commandes en cours de préparation.</p>
        </div>
        <a th:href="@{/stock/list}" class="btn btn-secondary btn-modern shadow-sm">
            <i class="bi bi-box-seam me-2"></i> Gérer Stocks
        </a>
    </div>

    <!-- Notification de stock bas -->
    <div th:if="${lowStocks != null and !lowStocks.isEmpty()}" class="alert alert-warning mb-4" role="alert">
        <h5 class="alert-heading fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i>Stock bas !</h5>
        <ul class="mb-0">
            <li th:each="stock : ${lowStocks}">
                <strong th:text="${stock.produit?.nom}">Produit</strong> :
                Il reste <span th:text="${stock.stockActuel}">0</span>
                <span th:text="${stock.produit?.quantite + ' ' + stock.produit?.unite}"></span>.
            </li>
        </ul>
    </div>

    <div th:if="${commandes.isEmpty()}" class="text-center py-5">
        <i class="bi bi-check-circle display-1 text-success opacity-50 mb-3"></i>
        <h3 class="fw-light">Tout est calme en cuisine.</h3>
        <p class="text-muted">En attente de nouvelles commandes...</p>
    </div>

    <div class="row g-4">
        <th:block th:each="commande : ${commandes}" th:with="hasPendingLines=${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') or commande.lignesCommande.![etat.toString()].contains('EN_PREPARATION')}">
            <div th:if="${hasPendingLines}" class="col-md-6 col-lg-4 col-xl-3">
                <div class="card card-modern shadow-sm border-0 chef-card h-100"
                     th:classappend="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'en-attente' : 'en-prepa'}">

                    <div class="card-header bg-transparent border-bottom-0 pb-0 pt-3 px-3 d-flex justify-content-between align-items-center">
                        <span class="badge rounded-pill px-3 py-2 fw-normal"
                              th:classappend="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'bg-danger' : 'bg-warning text-dark'}"
                              th:text="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'À FAIRE' : 'EN COURS'}">Statut</span>
                        <span class="fw-bold fs-5 text-dark">Cmd #<span th:text="${commande.id}"></span></span>
                    </div>

                    <div class="card-body px-3 pt-2">
                        <h5 class="fw-bold mb-3 text-secondary">
                            <span th:if="${commande.isEmporter}" class="badge bg-info">🛍️ À Emporter</span>
                            <span th:unless="${commande.isEmporter}">Table N°<span th:text="${commande.table?.numeroTable}"></span></span>
                        </h5>
                        <div class="mb-2">
                            <small class="text-muted"><i class="bi bi-person-badge me-1"></i>Serveur: <span th:text="${commande.serveur?.fullName}"></span></small>
                        </div>

                        <div th:if="${commande.commentaire != null and !commande.commentaire.isEmpty()}" class="alert alert-danger p-2 mb-3" role="alert">
                            <small class="fw-bold"><i class="bi bi-exclamation-triangle-fill me-1"></i>NOTE IMPORTANTE:</small><br>
                            <span th:text="${commande.commentaire}"></span>
                        </div>

                        <ul class="list-group list-group-flush rounded border-0">
                            <th:block th:each="ligne : ${commande.lignesCommande}" th:if="${ligne.etat.toString() == 'EN_ATTENTE' or ligne.etat.toString() == 'EN_PREPARATION'}">
                                <li class="list-group-item bg-transparent px-0 border-light d-flex justify-content-between align-items-start flex-column mb-2">
                                    <div class="d-flex w-100 justify-content-between align-items-center mb-2">
                                        <div th:if="${ligne.plat != null}" class="d-flex align-items-center">
                                            <span class="badge bg-secondary me-2 rounded-circle" style="width: 25px; height: 25px; display: inline-flex; align-items: center; justify-content: center;" th:text="${ligne.quantite}">1</span>
                                            <span class="fw-bold" th:text="${ligne.plat.nom}">Plat</span>
                                        </div>
                                        <div th:if="${ligne.menu != null}" class="d-flex align-items-center">
                                            <span class="badge bg-secondary me-2 rounded-circle" style="width: 25px; height: 25px; display: inline-flex; align-items: center; justify-content: center;" th:text="${ligne.quantite}">1</span>
                                            <span class="fw-bold" th:text="${ligne.menu.nom}">Menu</span>
                                        </div>
                                        <div>
                                            <span class="badge" th:classappend="${ligne.etat.toString() == 'EN_ATTENTE' ? 'bg-danger' : 'bg-warning text-dark'}" th:text="${ligne.etat.toString().replace('_', ' ')}">Statut</span>
                                        </div>
                                    </div>
                                    <div th:if="${ligne.menu != null}" class="d-flex flex-column w-100 ps-4">
                                        <ul class="mt-1 mb-2 list-unstyled small text-muted">
                                            <li th:each="platMenu : ${ligne.menu.plats}" th:text="'- ' + ${platMenu.nom}"></li>
                                        </ul>
                                    </div>
                                    <div class="d-flex w-100 gap-2 mt-2">
                                        <a th:if="${ligne.etat.toString() == 'EN_ATTENTE'}"
                                           th:href="@{/orders/prepare-ligne/{id}(id=${ligne.identifiant})}"
                                           class="btn btn-outline-primary btn-sm flex-grow-1 fw-bold">
                                            <i class="bi bi-fire me-1"></i> Lancer
                                        </a>

                                        <a th:if="${ligne.etat.toString() == 'EN_PREPARATION'}"
                                           th:href="@{/orders/finish-preparation-ligne/{id}(id=${ligne.identifiant})}"
                                           class="btn btn-success btn-sm flex-grow-1 fw-bold text-white">
                                            <i class="bi bi-check-lg me-1"></i> Terminer
                                        </a>
                                    </div>
                                </li>
                            </th:block>
                        </ul>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
