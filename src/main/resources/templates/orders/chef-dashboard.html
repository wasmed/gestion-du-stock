<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>KDS | Tableau de Bord Chef</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <meta http-equiv="refresh" content="30">

    <style>
        :root {
            --kds-bg: #121417;
            --ticket-bg: #fdfbf7;
            --ticket-text: #1e1e1e;
            --urgent-red: #e63946;
            --cooking-orange: #f4a261;
            --done-green: #2a9d8f;
            --rail-color: #2c3036;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--kds-bg);
            color: #ffffff;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .kds-header {
            background-color: var(--rail-color);
            border-bottom: 2px solid #3f454d;
            padding: 10px 20px !important;
        }

        .clock-display {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            color: #4cc9f0;
        }

        .kds-section-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .ticket-rail {
            position: relative;
            padding-top: 10px;
            min-height: 150px;
        }

        .ticket-rail::before {
            content: '';
            position: absolute;
            top: 0; left: 5px; right: 5px;
            height: 8px;
            background: linear-gradient(to bottom, #5a6069, #2c3036);
            border-radius: 4px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .ticket-rail.takeaway-rail::before {
            background: linear-gradient(to bottom, #4cc9f0, #023e8a);
            box-shadow: 0 3px 10px rgba(76, 201, 240, 0.3);
        }

        .chef-ticket {
            background-color: var(--ticket-bg);
            color: var(--ticket-text);
            border-radius: 0 0 6px 6px;
            position: relative;
            margin-top: -5px;
            box-shadow: 2px 8px 15px rgba(0,0,0,0.4);
            font-size: 0.85rem;
        }

        .chef-ticket::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 10px;
            background-image: radial-gradient(circle at 6px 0, transparent 7px, var(--ticket-bg) 8px);
            background-size: 12px 12px;
            background-repeat: repeat-x;
        }

        .chef-ticket.en-attente { border-top: 4px solid var(--urgent-red); }
        .chef-ticket.en-prepa { border-top: 4px solid var(--cooking-orange); }

        .ticket-header {
            padding: 12px 10px 6px;
            border-bottom: 1px dashed #ccc;
        }

        .order-number {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .ticket-item {
            border-bottom: 1px dashed #e0e0e0;
            padding: 6px 0;
        }
        .ticket-item:last-child { border-bottom: none; }

        .qty-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            width: 24px; height: 24px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 3px;
            background-color: #e9ecef;
            border: 1px solid #dee2e6;
        }

        .item-name {
            font-size: 0.9rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .btn-kds {
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-fire { background-color: var(--urgent-red); color: white; }
        .btn-finish { background-color: var(--done-green); color: white; }

        @keyframes flash-red {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .badge-urgent { background-color: var(--urgent-red); animation: flash-red 2s infinite; font-size: 0.7rem;}
        .badge-cooking { background-color: var(--cooking-orange); color: #000; font-size: 0.7rem;}
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="kds-header d-flex justify-content-between align-items-center mb-2">
    <div class="d-flex align-items-center gap-2">
        <i class="bi bi-display text-white fs-4"></i>
        <h5 class="fw-bold mb-0 text-white text-uppercase m-0">KDS Chef</h5>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="clock-display" id="kitchenClock">00:00</div>
        <a th:href="@{/stock/list}" class="btn btn-outline-light btn-sm fw-bold">
            <i class="bi bi-box-seam"></i> Stocks
        </a>
    </div>
</div>

<div class="container-fluid px-2 pb-4">

    <div th:if="${errorMessage}" class="alert alert-danger py-2 px-3 mb-2 small" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${lowStocks != null and !lowStocks.isEmpty()}" class="alert alert-danger py-2 px-3 mb-3 small border-danger" role="alert">
        <strong><i class="bi bi-exclamation-octagon-fill"></i> Alertes :</strong>
        <span th:each="stock, iterStat : ${lowStocks}">
            <span th:text="${stock.produit?.nom}"></span> (<span th:text="${#numbers.formatDecimal(stock.stockActuel, 0, 0)}"></span>)
            <span th:if="${!iterStat.last}">, </span>
        </span>
    </div>

    <div th:if="${commandes.isEmpty()}" class="text-center py-5 mt-5">
        <i class="bi bi-cup-hot fs-1 text-secondary opacity-25"></i>
        <p class="text-secondary opacity-50 font-monospace mt-2">AUCUNE COMMANDE EN COURS</p>
    </div>

    <div th:if="${!commandes.isEmpty()}">
        <div class="kds-section-title text-light mt-3 mb-2 px-2 d-flex align-items-center gap-2">
            <i class="bi bi-geo-alt-fill text-secondary"></i> <span>COMMANDES EN SALLE</span>
        </div>

        <div class="row g-2 ticket-rail px-2 mb-4">
            <th:block th:each="commande : ${commandes}" th:with="hasPendingLines=${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') or commande.lignesCommande.![etat.toString()].contains('EN_PREPARATION')}">
                <div th:if="${hasPendingLines and !commande.isEmporter}" class="col-12 col-sm-6 col-md-4 col-lg-3 col-xxl-2">
                    <div class="chef-ticket h-100 d-flex flex-column" th:classappend="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'en-attente' : 'en-prepa'}">

                        <div class="ticket-header">
                            <div class="d-flex justify-content-between align-items-start mb-1">
                                <span class="badge px-2 py-1 text-uppercase"
                                      th:classappend="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'badge-urgent' : 'badge-cooking'}"
                                      th:text="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'À Lancer' : 'Cuisson'}"></span>
                                <div class="text-end">
                                    <div class="text-muted font-monospace fw-bold mb-1" style="font-size: 0.7rem;">
                                        <i class="bi bi-clock"></i> <span th:text="${#temporals.format(commande.dateHeure, 'HH:mm')}"></span>
                                    </div>
                                    <div class="order-number lh-1">#<span th:text="${commande.id}"></span></div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-1">
                                <span class="fw-bold text-dark text-uppercase small">
                                    <i class="bi bi-geo-alt-fill text-muted"></i> Tab.<span th:text="${commande.table?.numeroTable}" class="text-primary fs-6"></span>
                                </span>
                                <small class="text-muted fw-bold font-monospace" style="font-size: 0.7rem;"><i class="bi bi-person"></i> <span th:text="${#strings.abbreviate(commande.serveur?.fullName, 10)}"></span></small>
                            </div>
                        </div>

                        <div th:if="${commande.commentaire != null and !commande.commentaire.isEmpty()}" class="bg-warning px-2 py-1 border-bottom border-warning">
                            <small class="text-dark fw-bold lh-sm d-block" style="font-size: 0.7rem;" th:text="${commande.commentaire}"></small>
                        </div>

                        <div class="card-body px-2 py-1 flex-grow-1">
                            <div th:each="ligne : ${commande.lignesCommande}" th:if="${ligne.etat.toString() == 'EN_ATTENTE' or ligne.etat.toString() == 'EN_PREPARATION'}" class="ticket-item">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="d-flex align-items-start gap-2">
                                        <span class="qty-badge fw-bold" th:text="${ligne.quantite}">1</span>
                                        <div>
                                            <div class="item-name text-dark" th:if="${ligne.plat != null}" th:text="${ligne.plat.nom}">Plat</div>
                                            <div class="item-name text-dark" th:if="${ligne.menu != null}" th:text="${ligne.menu.nom}">Menu</div>
                                            <div th:if="${ligne.menu != null}" class="text-muted fw-medium" style="font-size: 0.7rem; line-height: 1;">
                                                <div th:each="platMenu : ${ligne.menu.plats}" th:text="'+ ' + ${platMenu.nom}"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex w-100 gap-1 mt-2">
                                    <a th:if="${ligne.etat.toString() == 'EN_ATTENTE'}" th:href="@{/orders/prepare-ligne/{id}(id=${ligne.identifiant})}" class="btn-kds btn-fire flex-grow-1 text-decoration-none"><i class="bi bi-fire"></i> Feu</a>
                                    <a th:if="${ligne.etat.toString() == 'EN_PREPARATION'}" th:href="@{/orders/finish-preparation-ligne/{id}(id=${ligne.identifiant})}" class="btn-kds btn-finish flex-grow-1 text-decoration-none"><i class="bi bi-check-circle-fill"></i> Prêt</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>

        <div class="kds-section-title text-info mt-4 mb-2 px-2 d-flex align-items-center gap-2 border-top border-secondary pt-3">
            <i class="bi bi-bag-fill"></i> <span>COMMANDES À EMPORTER</span>
        </div>

        <div class="row g-2 ticket-rail takeaway-rail px-2 mb-4">
            <th:block th:each="commande : ${commandes}" th:with="hasPendingLines=${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') or commande.lignesCommande.![etat.toString()].contains('EN_PREPARATION')}">
                <div th:if="${hasPendingLines and commande.isEmporter}" class="col-12 col-sm-6 col-md-4 col-lg-3 col-xxl-2">
                    <div class="chef-ticket h-100 d-flex flex-column" th:classappend="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'en-attente' : 'en-prepa'}">

                        <div class="ticket-header" style="background-color: rgba(76, 201, 240, 0.05);">
                            <div class="d-flex justify-content-between align-items-start mb-1">
                                <span class="badge px-2 py-1 text-uppercase"
                                      th:classappend="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'badge-urgent' : 'badge-cooking'}"
                                      th:text="${commande.lignesCommande.![etat.toString()].contains('EN_ATTENTE') ? 'À Lancer' : 'Cuisson'}"></span>
                                <div class="text-end">
                                    <div class="text-muted font-monospace fw-bold mb-1" style="font-size: 0.7rem;">
                                        <i class="bi bi-clock"></i> <span th:text="${#temporals.format(commande.dateHeure, 'HH:mm')}"></span>
                                    </div>
                                    <div class="order-number lh-1">#<span th:text="${commande.id}"></span></div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-1">
                                <span class="fw-bold text-dark text-uppercase small">
                                    <span class="badge bg-info text-dark rounded-1"><i class="bi bi-bag-fill"></i> EMPORTER</span>
                                </span>
                                <small class="text-muted fw-bold font-monospace" style="font-size: 0.7rem;"><i class="bi bi-person"></i> <span th:text="${#strings.abbreviate(commande.serveur?.fullName, 10)}"></span></small>
                            </div>
                        </div>

                        <div th:if="${commande.commentaire != null and !commande.commentaire.isEmpty()}" class="bg-warning px-2 py-1 border-bottom border-warning">
                            <small class="text-dark fw-bold lh-sm d-block" style="font-size: 0.7rem;" th:text="${commande.commentaire}"></small>
                        </div>

                        <div class="card-body px-2 py-1 flex-grow-1">
                            <div th:each="ligne : ${commande.lignesCommande}" th:if="${ligne.etat.toString() == 'EN_ATTENTE' or ligne.etat.toString() == 'EN_PREPARATION'}" class="ticket-item">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="d-flex align-items-start gap-2">
                                        <span class="qty-badge fw-bold" th:text="${ligne.quantite}">1</span>
                                        <div>
                                            <div class="item-name text-dark" th:if="${ligne.plat != null}" th:text="${ligne.plat.nom}">Plat</div>
                                            <div class="item-name text-dark" th:if="${ligne.menu != null}" th:text="${ligne.menu.nom}">Menu</div>
                                            <div th:if="${ligne.menu != null}" class="text-muted fw-medium" style="font-size: 0.7rem; line-height: 1;">
                                                <div th:each="platMenu : ${ligne.menu.plats}" th:text="'+ ' + ${platMenu.nom}"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex w-100 gap-1 mt-2">
                                    <a th:if="${ligne.etat.toString() == 'EN_ATTENTE'}" th:href="@{/orders/prepare-ligne/{id}(id=${ligne.identifiant})}" class="btn-kds btn-fire flex-grow-1 text-decoration-none"><i class="bi bi-fire"></i> Feu</a>
                                    <a th:if="${ligne.etat.toString() == 'EN_PREPARATION'}" th:href="@{/orders/finish-preparation-ligne/{id}(id=${ligne.identifiant})}" class="btn-kds btn-finish flex-grow-1 text-decoration-none"><i class="bi bi-check-circle-fill"></i> Prêt</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('kitchenClock').textContent = timeString;
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
